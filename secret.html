<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✦</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: #e8e8e8;
      overflow: hidden;
    }

    #starfield {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      padding: 40px;
      max-width: 500px;
      text-align: center;
    }

    .secret-label {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #f9a825;
      opacity: 0;
      animation: fadein 1.5s ease forwards;
      animation-delay: 0.3s;
    }

    .video-wrap {
      width: 100%;
      max-width: 180px;
      aspect-ratio: 9/16;
      border-radius: 12px;
      overflow: hidden;
      background: #1a1a1a;
      box-shadow: 0 0 60px rgba(249, 168, 37, 0.15);
      opacity: 0;
      animation: fadein 1.5s ease forwards;
      animation-delay: 0.6s;
    }

    .video-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .instagram-link {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #e8e8e8;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 50px;
      padding: 12px 24px;
      font-size: 13px;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      opacity: 0;
      animation: fadein 1.5s ease forwards;
      animation-delay: 0.9s;
    }

    .instagram-link:hover {
      border-color: #c13584;
      box-shadow: 0 0 20px rgba(193, 53, 132, 0.2);
      color: white;
    }

    .instagram-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .back-btn {
      position: fixed;
      top: 30px;
      left: 40px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #444;
      text-decoration: none;
      border-bottom: 1px solid #444;
      padding-bottom: 2px;
      transition: opacity 0.2s;
      z-index: 10;
      opacity: 0;
      animation: fadein 1.5s ease forwards;
      animation-delay: 1.2s;
    }

    .back-btn:hover { opacity: 0.6 !important; }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <canvas id="starfield"></canvas>
  <a href="index.html" class="back-btn">← Back to Universe</a>

  <div class="content">
    <div class="secret-label">✦ You found it ✦</div>

    <div class="video-wrap">
      <img src="./little-me.png" alt="little me" style="width:100%; height:100%; object-fit:cover;">
    </div>

    <a href="https://www.instagram.com/wumarawu" target="_blank" class="instagram-link">
      <svg class="instagram-icon" viewBox="0 0 24 24" fill="none" stroke="url(#ig-gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <defs>
          <linearGradient id="ig-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#f09433"/>
            <stop offset="25%" stop-color="#e6683c"/>
            <stop offset="50%" stop-color="#dc2743"/>
            <stop offset="75%" stop-color="#cc2366"/>
            <stop offset="100%" stop-color="#bc1888"/>
          </linearGradient>
        </defs>
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="0.5" fill="url(#ig-gradient)" stroke="none"/>
      </svg>
      Contact me here
    </a>
  </div>

  <script>
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const stars = Array.from({ length: 200 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      radius: Math.random() * 1.5 + 0.3,
      opacity: Math.random(),
      twinkleSpeed: Math.random() * 0.02 + 0.005
    }));

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(star => {
        star.opacity += star.twinkleSpeed;
        if (star.opacity > 1 || star.opacity < 0) star.twinkleSpeed *= -1;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
        ctx.fill();
      });
      requestAnimationFrame(drawStars);
    }

    drawStars();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>

</body>
</html>
