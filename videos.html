<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wumara — Videos</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f2ebe0;
      font-family: 'Inter', sans-serif;
      color: #2a1f14;
      min-height: 100vh;
    }

    /* ---- HERO ---- */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: linear-gradient(160deg, #1a0a2e 0%, #2d1b4e 25%, #8b3a3a 60%, #d4651a 80%, #e8a030 100%);
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: orb-float ease-in-out infinite;
    }

    .orb-1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #e85d3a, transparent);
      top: -100px;
      right: -100px;
      animation-duration: 8s;
    }

    .orb-2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #4a90d9, transparent);
      bottom: -80px;
      left: -80px;
      animation-duration: 10s;
      animation-delay: -3s;
    }

    .orb-3 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #e8a030, transparent);
      top: 40%;
      left: 30%;
      animation-duration: 12s;
      animation-delay: -6s;
    }

    @keyframes orb-float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(30px, -20px) scale(1.05); }
      66%       { transform: translate(-20px, 30px) scale(0.95); }
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .hero-eyebrow {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 16px;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(80px, 16vw, 180px);
      font-weight: 700;
      color: #fff;
      letter-spacing: -3px;
      line-height: 0.9;
      text-shadow: 0 0 80px rgba(232, 160, 48, 0.3);
    }

    .hero-scroll-hint {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      animation: bounce 2s ease-in-out infinite;
      z-index: 2;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(6px); }
    }

    .hero-back {
      position: absolute;
      top: 40px;
      left: 50px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      padding-bottom: 2px;
      transition: opacity 0.2s;
      z-index: 10;
    }

    .hero-back:hover { opacity: 0.6; }

    .hero-name {
      position: absolute;
      top: 40px;
      right: 50px;
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      z-index: 10;
    }

    /* ---- CATALOGS SECTION ---- */
    .catalogs-section {
      padding: 80px 60px;
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .section-label {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #b07040;
      margin-bottom: 50px;
    }

    .catalogs-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      justify-content: center;
      max-width: 900px;
    }

    /* Catalog bubble */
    .catalog-bubble {
      width: 280px;
      height: 280px;
      border-radius: 24px;
      background: linear-gradient(135deg, #e8d5b0, #d4a060);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      gap: 12px;
      padding: 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 8px 30px rgba(180, 100, 40, 0.2);
      cursor: pointer;
    }

    .catalog-bubble:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 20px 50px rgba(180, 100, 40, 0.3);
    }

    /* Texture overlay */
    .catalog-bubble::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
    }

    .catalog-bubble-number {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(42, 31, 20, 0.4);
    }

    .catalog-bubble-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 400;
      color: #2a1f14;
      line-height: 1.2;
    }

    .catalog-bubble-desc {
      font-size: 12px;
      color: rgba(42, 31, 20, 0.5);
      line-height: 1.5;
      font-style: italic;
    }

    .catalog-bubble-count {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(42, 31, 20, 0.4);
      margin-top: 8px;
    }

    /* Coming soon bubble */
    .catalog-bubble.coming-soon {
      background: linear-gradient(135deg, #e8e0d0, #d8c8a8);
      opacity: 0.5;
      cursor: default;
      pointer-events: none;
    }

    .coming-soon-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(42, 31, 20, 0.3);
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <a href="index.html" class="hero-back">← Universe</a>
    <a href="index.html" class="hero-name">Wumara</a>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="hero-content">
      <div class="hero-eyebrow">Wumara · Visual Work</div>
      <h1 class="hero-title">Videos</h1>
    </div>
    <div class="hero-scroll-hint">↓ scroll</div>
  </section>

  <!-- CATALOGS -->
  <section class="catalogs-section">
    <div class="section-label">✦ Catalogs ✦</div>
    <div class="catalogs-grid">

      <!-- Collage Core -->
      <a href="collage-core.html" class="catalog-bubble">
        <div class="catalog-bubble-number">Series 001</div>
        <div class="catalog-bubble-title">Collage Core</div>
        <div class="catalog-bubble-desc">Videos that just seem to go together — connected by music that makes the pictures dance.</div>
        <div class="catalog-bubble-count">17 videos</div>
      </a>

      <!-- Placeholder for next series -->
      <div class="catalog-bubble coming-soon">
        <div class="catalog-bubble-number">Series 002</div>
        <div class="catalog-bubble-title">Coming Soon</div>
        <div class="coming-soon-label">In the works</div>
      </div>

    </div>
  </section>

</body>
</html>
